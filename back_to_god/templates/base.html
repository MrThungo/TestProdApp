<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#101812" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/brand/city-centre-favicon-rounded.png') }}" />
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/brand/city-centre-favicon-rounded.png') }}" />
    <title>{% block title %}Back to God AOG{% endblock %}</title>
    <script>
      (() => {
        const match = document.cookie.match(/(?:^|;\s*)btg_theme=(light|dark)/);
        const theme = match ? match[1] : "light";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              btg: {
                ink: "#111812",
                muted: "#647169",
                paper: "#ffffff",
                line: "#dfe8e1",
                green: "#173f32",
                green2: "#28644d",
                gold: "#c28835",
                clay: "#a64e3b",
                mist: "#f4f7f1",
                night: "#101812",
              },
            },
            boxShadow: {
              material: "0 18px 54px rgba(17, 24, 18, 0.13)",
              soft: "0 10px 28px rgba(17, 24, 18, 0.08)",
            },
            borderRadius: {
              material: "8px",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body class="min-h-screen bg-gradient-to-b from-[#f9fbf6] via-[#eff5ee] to-[#f7f8f3] text-btg-ink antialiased {% block body_class %}{% endblock %}">
    {% block page %}{% endblock %}
    {% include "partials/scroll_controls.html" %}
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
