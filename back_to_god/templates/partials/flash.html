{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="grid gap-2" role="status" aria-live="polite">
      {% for category, message in messages %}
        <div class="rounded-material border px-4 py-3 font-semibold shadow-soft {% if category == 'error' %}border-red-200 bg-red-50 text-btg-clay{% else %}border-emerald-200 bg-emerald-50 text-btg-green{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
